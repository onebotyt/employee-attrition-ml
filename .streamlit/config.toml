[theme]
primaryColor      = "#7c3aed"
backgroundColor   = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor         = "#e2e8f0"
font              = "sans serif"


[browser]
# Disable usage stats (privacy)
gatherUsageStats  = false

[runner]
# Faster startup
magicEnabled      = false

[logger]
# Don't log sensitive info
level             = "warning"
